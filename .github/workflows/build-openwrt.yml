# Build socks5pbr + luci-app-socks5pbr (mosdns-style: Go cross-compile + manual .ipk pack)
# No OpenWrt SDK; produces .ipk artifacts for x86_64.

name: Build OpenWrt packages

on:
  push:
    branches: [ main, master, openwrt-24.10 ]
  pull_request:
    branches: [ main, master, openwrt-24.10 ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: feed

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: feed/socks5pbr/go.sum

      - name: Build and pack IPK
        run: |
          chmod +x feed/socks5pbr/scripts/build-ipk.sh
          cd feed && ./socks5pbr/scripts/build-ipk.sh amd64

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-x86_64
          path: feed/out/*.ipk
